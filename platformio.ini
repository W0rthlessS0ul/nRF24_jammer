; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
extra_scripts =
    scripts/copy_files.py
build_unflags = -std=gnu++11
lib_deps =
    Update
    RF24
    NimBLE-Arduino
    Adafruit GFX Library
    Adafruit SSD1306
    Adafruit BusIO
    GyverButton
    EEPROM
    Wire
    SPI
    WiFi
    DNSServer
    WebServer

[env:128x32_Flexible]
board = esp32dev
build_src_filter = -<*> +<128x32_Flexible/>
build_flags =
    -std=gnu++17
    -Wl,-z,muldefs
    -Iinclude/128x32_Flexible

[env:128x64_Flexible]
board = esp32dev
build_src_filter = -<*> +<128x64_Flexible/>
build_flags =
    -std=gnu++17
    -Wl,-z,muldefs
    -Iinclude/128x64_Flexible

; ============================================================
; LOLIN32 Lite + nRF24L01+PA+LNA
; Display OLED 128x64 SSD1306
; CE=GPIO4, CSN=GPIO5, SPI VSPI (SCK=18 MISO=19 MOSI=23)
; LED=GPIO22 (active LOW), I2C: SDA=21 SCL=22
; btnOK=GPIO34, btnNext=GPIO35 (INPUT-ONLY, pull-up esterno 10k!)
; btnPrev=GPIO32
; ============================================================
[env:128x64_LOLIN32]
board = lolin32_lite
build_src_filter = -<*> +<128x64_LOLIN32/>
build_flags =
    -std=gnu++17
    -Wl,-z,muldefs
    -Iinclude/128x64_LOLIN32
