; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
extra_scripts =
    scripts/copy_files.py
build_unflags = -std=gnu++11
lib_deps =
    Update
    RF24
    NimBLE-Arduino
    Adafruit GFX Library
    Adafruit SSD1306
    Adafruit BusIO
    GyverButton
    EEPROM
    Wire
    SPI
    WiFi
    DNSServer
    WebServer

[env:128x32_Flexible]
build_src_filter = -<*> +<128x32_Flexible/>
build_flags =
    -std=gnu++17
    -Wl,-z,muldefs
    -Iinclude/128x32_Flexible

[env:128x64_Flexible]
build_src_filter = -<*> +<128x64_Flexible/>
build_flags =
    -std=gnu++17
    -Wl,-z,muldefs
    -Iinclude/128x64_Flexible

; ============================================================
; Target: ESP32 WeMos LOLIN32 Lite + nRF24L01+PA+LNA
; Display: SSD1306 128x64 OLED (I2C SDA=21 SCL=22)
; Buttons: GPIO34(OK) GPIO35(Next) GPIO32(Prev)
;          GPIO34/35 are INPUT-ONLY: external 10k pull-up to 3.3V required!
; nRF24:   CE=4  CSN=5  SCK=18  MOSI=23  MISO=19  (VSPI)
; LED:     GPIO22  ACTIVE-LOW
; ============================================================
[env:128x64_LOLIN32]
board = lolin32_lite
build_src_filter = -<*> +<128x64_LOLIN32/>
build_flags =
    -std=gnu++17
    -Wl,-z,muldefs
    -Iinclude/128x64_LOLIN32
